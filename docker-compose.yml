name: searxncrawl

services:
  # ---------------------------------------------------------------------------
  # SearXNG metasearch engine (bundled so `docker compose up` works out of the
  # box). JSON output is enabled and the rate limiter is disabled in
  # ./searxng/settings.yml so the MCP `search` tool can query it freely.
  # ---------------------------------------------------------------------------
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    # No host port published: only the MCP server needs SearXNG, and it reaches
    # it internally over the compose network at http://searxng:8080. To expose
    # it on the host for debugging, uncomment (pick any free host port):
    #   ports:
    #     - "8888:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ---------------------------------------------------------------------------
  # searxNcrawl MCP server (SearXNG search + Crawl4AI/Playwright extraction).
  # Reaches SearXNG over the compose network at http://searxng:8080.
  # ---------------------------------------------------------------------------
  searxncrawl:
    build:
      context: .
      dockerfile: Dockerfile
    image: searxncrawl:latest
    # Run tini as PID 1 to reap orphaned Chromium/crashpad processes that
    # Playwright can leave behind, so they don't pile up in the container.
    init: true
    # .env is optional: the stack has working defaults without it.
    env_file:
      - path: .env
        required: false
    environment:
      # Wire to the bundled SearXNG service (overrides any SEARXNG_URL from .env).
      SEARXNG_URL: http://searxng:8080
    ports:
      - "${MCP_PORT:-9555}:${MCP_PORT:-9555}"
    depends_on:
      searxng:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - "curl -sS -o /dev/null -w '%{http_code}' http://localhost:${MCP_PORT:-9555}/mcp | grep -qE '^[1-4][0-9]{2}$$'"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    command:
      - python
      - -m
      - crawler.mcp_server
      - --transport
      - http
      - --host
      - 0.0.0.0
      - --port
      - "${MCP_PORT:-9555}"
    restart: unless-stopped
